component:
  id: heating-value-attribution-factor
  name: Heating-Value Attribution Factor
  version: "1.0"

  metadata:
    pathway: biochar
    stage: any
    description: >-
      Calculates the fraction of feedstock-related emissions attributable to
      biochar, based on heating-value replacement. Produces a percentage:
      (feedstock dry tons replaced by biochar) / (total green tons burned).
      This subtree appears identically in feedstock sourcing, production
      electricity, and production stack emissions.
    methodology:
      - registry: isometric
        requirement: >-
          Emissions must be allocated to biochar using heating-value-based
          attribution factor

  inputs:
    static_data_points:
      - slug_template: "biochar-heating-value-"
        unit: "btu/lb"
        description: Heating value of biochar product
        category: emissions
        subcategory: fuel_emissions
      - slug_template: "{prefix}-heating-value-"
        unit: "btu/lb"
        description: Heating value of feedstock
        category: emissions
        subcategory: fuel_emissions
      - slug_template: "fuel-moisture-content-"
        unit: "%"
        description: Moisture content of fuel/feedstock
        category: emissions
        subcategory: fuel_emissions
    event_data_points:
      - slug_template: "total-green-tons-burned"
        unit: "U.S. ton"
        description: Total green tons of feedstock burned
        category: emissions
        subcategory: fuel_emissions
    upstream_references:
      - slug_template: "tons-biochar-produced-dry"
        unit: "U.S. ton"
        description: Dry biochar mass from production stage

  outputs:
    calculated_data_points:
      - slug_template: "tons-feedstock-replacement-dry"
        unit: "U.S. ton"
        description: Feedstock dry tons replaced by biochar (intermediate output)

  parameters:
    - name: prefix
      description: "Feedstock slug prefix (e.g., 'feedstock')"
      default: "feedstock"

  node_tree:
    mangrove_nodes:
    - name: Biochar Attribution Factor
      output_unit: "%"
      operator: quotient
      mangrove_nodes:
      - name: Feedstock Green Tons Replacement
        output_unit: "U.S. ton"
        order: 0
        operator: quotient
        mangrove_nodes:
        - name: Feedstock Dry Tons Replacement
          output_unit: "U.S. ton"
          order: 0
          data_point_type: tons-feedstock-replacement-dry
          operator: product
          mangrove_nodes:
          - name: Tons Biochar Produced (DRY)
            output_unit: "U.S. ton"
            data_point_type: tons-biochar-produced-dry
          - name: Feedstock Replacement Factor
            output_unit: ""
            operator: quotient
            mangrove_nodes:
            - name: Biochar Heating Value
              output_unit: "btu/lb"
              order: 0
              data_point_type: biochar-heating-value-
              category: emissions
              subcategory: fuel_emissions
            - name: Feedstock Heating Value
              output_unit: "btu/lb"
              order: 1
              data_point_type: "{prefix}-heating-value-"
              category: emissions
              subcategory: fuel_emissions
        - name: Fuel Dry Percentage
          output_unit: "%"
          data_point_type: fuel-dry-percentage
          order: 1
          operator: "1 - fuel-moisture-content-"
          mangrove_nodes:
          - name: Fuel Moisture Content
            output_unit: "%"
            data_point_type: fuel-moisture-content-
            category: emissions
            subcategory: fuel_emissions
      - name: Total Green Tons Burned
        output_unit: "U.S. ton"
        operator: summation
        mangrove_nodes:
        - name: Green Tons Burned
          output_unit: "U.S. ton"
          data_point_type: total-green-tons-burned
          category: emissions
          subcategory: fuel_emissions
